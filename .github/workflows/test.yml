name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: download modules
        run: go mod download

      - name: run tests
        run: go test -v -race ./...

      - name: build demo
        run: go build ./cmd/demo/...
